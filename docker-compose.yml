
version: "3.8"

services:
  nginx:
    build:
      context: ./nginx
    container_name: "nginx"  
    ports:
      - "80:80"
    networks:
      - notes-app
    depends_on:
      - django
    restart: always

  mysql:
    image: mysql:latest
    container_name: "db_cont"
    ports:
      - "3306:3306"
    networks:
      - notes-app
    volumes:
      - ./mysql-data:/var/lib/mysql
    environment:
      MYSQL_DATABASE: test_db
      MYSQL_ROOT_PASSWORD: root 
    restart: always

    healthcheck:   
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  django:
    build:
      context: .
    container_name: "django_cont"
    command: sh -c "python manage.py migrate --no-input && gunicorn notesapp.wsgi --bind 0.0.0.0:8000"   
    ports:
      - "8000:8000"
    networks:
      - notes-app
    env_file:
      - ".env"
    depends_on:
      - mysql
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/admin || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s



networks:
  notes-app:

volumes:
  mysql-data:    
